- name: pushToPod
  uses: o-development/clone-to-solid-pod@master
  with:
    # 1. Your Pod Server URL (OIDC Issuer)
    solid-idp: ${{ secrets.SOLID_OIDC_ISSUER }} 
    
    # 2. The Client ID you generated
    solid-client-id: ${{ secrets.SOLID_CLIENT_ID }}
    
    # 3. The Client Secret you generated
    solid-client-secret: ${{ secrets.SOLID_CLIENT_SECRET }}
    
    # Destination in your Pod
    solid-shell-dest: "/public/cloned/"
